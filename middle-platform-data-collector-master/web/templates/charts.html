{% extends "base.html" %}
{% block title %}图表分析 - 数据采集工具{% endblock %}

{% block head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<style>
.charts-container { max-width: 100%; }
.chart-panel {
    background: var(--surface); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-1); border-radius: var(--r-lg);
    box-shadow: var(--shadow-sm); overflow: hidden;
    display: flex; flex-direction: column;
}
.panel-header {
    padding: 14px 20px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border-1);
    background: linear-gradient(135deg, rgba(124,58,237,0.04) 0%, rgba(96,165,250,0.03) 100%);
    flex-shrink: 0;
}
.panel-header-icon {
    width: 30px; height: 30px; border-radius: var(--r-sm);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    background: linear-gradient(135deg, #7c3aed, #6d28d9);
    box-shadow: 0 2px 6px rgba(124,58,237,0.25);
}
.panel-header-icon svg { width: 16px; height: 16px; color: #fff; }
.panel-header h2 { font-size: 15px; font-weight: 700; color: var(--text-1); letter-spacing: -0.02em; margin: 0; }
.panel-body { padding: 16px 18px 18px; flex: 1; display: flex; flex-direction: column; }
.chart-filter {
    display: flex; gap: 8px; align-items: flex-end;
    margin-bottom: 16px; padding-bottom: 14px;
    border-bottom: 1px dashed var(--border-1);
    flex-wrap: wrap; flex-shrink: 0;
}
.chart-filter .fg { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 90px; }
.chart-filter .fg label {
    font-size: 11px; font-weight: 500; color: var(--text-3); letter-spacing: 0.02em;
}
.chart-filter .fg label .req { color: #ef4444; margin-left: 2px; }
.chart-filter .fg input, .chart-filter .fg select {
    padding: 6px 9px; border: 1px solid var(--border-1); border-radius: var(--r-xs);
    font-size: 12px; color: var(--text-1); background: rgba(255,255,255,0.7);
    outline: none; transition: all 0.2s ease; width: 100%;
    appearance: none; -webkit-appearance: none;
}
.chart-filter .fg input:focus, .chart-filter .fg select:focus {
    border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-soft); background: #fff;
}
.chart-filter .btn-query {
    padding: 6px 16px; background: var(--primary); color: #fff; border: none;
    border-radius: var(--r-xs); font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.2s ease; white-space: nowrap;
    display: flex; align-items: center; gap: 4px; flex-shrink: 0; align-self: flex-end;
    height: 30px;
}
.chart-filter .btn-query:hover { background: var(--primary-hover); }
.chart-filter .btn-query:disabled { opacity: 0.5; cursor: not-allowed; }
.x-axis-hint {
    font-size: 12px; color: var(--text-3); margin-bottom: 12px;
    display: flex; align-items: center; gap: 6px;
}
.x-axis-hint .badge {
    display: inline-block; padding: 2px 8px;
    background: rgba(124,58,237,0.1); color: #7c3aed;
    border-radius: 4px; font-weight: 600; font-size: 11px;
}
.chart-canvas-wrap {
    position: relative; height: 420px; padding: 10px 0;
}
.chart-empty {
    display: none; align-items: center; justify-content: center;
    height: 300px; color: var(--text-4); font-size: 14px;
}
.chart-summary {
    margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--border-1);
    display: flex; gap: 24px; font-size: 12px; color: var(--text-3);
}
.chart-summary .stat { display: flex; align-items: center; gap: 4px; }
.chart-summary .stat-val { font-weight: 700; color: var(--text-1); font-variant-numeric: tabular-nums; }
.chart-summary .top5 { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
.chart-summary .top5 .rank { font-weight: 600; color: var(--primary); }
.page-header { margin-bottom: 24px; }
.page-header h1 { font-size: 22px; font-weight: 800; color: var(--text-1); letter-spacing: -0.02em; }
.page-header .subtitle { font-size: 13px; color: var(--text-3); margin-top: 4px; }
</style>
{% endblock %}

{% block content %}
<div class="charts-container">
    <div class="page-header">
        <h1>图表分析</h1>
        <div class="subtitle">基于 Metabase API 实时数据的多维度使用率分析</div>
    </div>

    <div class="chart-panel">
        <div class="panel-header">
            <div class="panel-header-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/>
                </svg>
            </div>
            <h2>平台使用率对比</h2>
        </div>
        <div class="panel-body">
            <div class="chart-filter">
                <div class="fg" style="max-width:130px">
                    <label>开始日期<span class="req">*</span></label>
                    <input type="date" id="c_start">
                </div>
                <div class="fg" style="max-width:130px">
                    <label>结束日期<span class="req">*</span></label>
                    <input type="date" id="c_end">
                </div>
                <div class="fg">
                    <label>学校</label>
                    <select id="c_school"><option value="">全部</option></select>
                </div>
                <div class="fg">
                    <label>学段</label>
                    <select id="c_stage"><option value="">全部</option></select>
                </div>
                <div class="fg">
                    <label>年级</label>
                    <select id="c_grade"><option value="">全部</option></select>
                </div>
                <div class="fg">
                    <label>学科</label>
                    <select id="c_subject"><option value="">全部</option></select>
                </div>
                <button class="btn-query" id="c_btn" onclick="queryChart()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:12px;height:12px"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    查询
                </button>
            </div>
            <div class="x-axis-hint">
                当前X轴维度：<span class="badge" id="x_axis_badge">学校</span>
            </div>
            <div class="chart-canvas-wrap" id="chart_wrap">
                <canvas id="usageChart"></canvas>
            </div>
            <div class="chart-empty" id="chart_empty">暂无数据</div>
            <div class="chart-summary" id="chart_summary"></div>
            <div class="data-source-footer" id="dataSourceFooter" style="text-align:center; padding:10px 0 0; font-size:11px; color:var(--text-4); display:none;"><span id="footerSourceText"></span></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
var OPTIONS = { schools: [], stages: [], grades: [], subjects: [] };
var STAGE_GRADE_MAP = {
    "高中": ["高一", "高二", "高三"],
    "初中": ["七年级", "八年级", "九年级"],
    "小学": ["一年级", "二年级", "三年级", "四年级", "五年级", "六年级"]
};
var AXIS_LABELS = { school: "学校", stage: "学段", grade: "年级", subject: "学科" };
var chartInstance = null;
Chart.register(ChartDataLabels);

function formatDate(d) {
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function initDefaults() {
    var now = new Date();
    var first = new Date(now.getFullYear(), now.getMonth(), 1);
    var last = new Date(now.getFullYear(), now.getMonth() + 1, 0);
    document.getElementById("c_start").value = formatDate(first);
    document.getElementById("c_end").value = formatDate(last);
}

function fillSelect(id, items, valueFn, labelFn) {
    var sel = document.getElementById(id);
    items.forEach(function(item) {
        var opt = document.createElement("option");
        opt.value = valueFn(item);
        opt.textContent = labelFn(item);
        sel.appendChild(opt);
    });
}

function resetSelect(id) {
    var sel = document.getElementById(id);
    sel.innerHTML = '<option value="">全部</option>';
}

function onSchoolChange() {
    resetSelect("c_stage"); resetSelect("c_grade"); resetSelect("c_subject");
    // Refill stages and subjects (always full list)
    fillSelect("c_stage", OPTIONS.stages, function(s){return s}, function(s){return s});
    fillSelect("c_subject", OPTIONS.subjects, function(s){return s}, function(s){return s});
}

function onStageChange() {
    var stage = document.getElementById("c_stage").value;
    resetSelect("c_grade");
    if (stage && STAGE_GRADE_MAP[stage]) {
        STAGE_GRADE_MAP[stage].forEach(function(g) {
            var opt = document.createElement("option");
            opt.value = g; opt.textContent = g;
            document.getElementById("c_grade").appendChild(opt);
        });
    } else {
        fillSelect("c_grade", OPTIONS.grades, function(s){return s}, function(s){return s});
    }
}

function renderChart(resp) {
    var data = resp.data;
    var x_axis = resp.x_axis;

    document.getElementById("x_axis_badge").textContent = AXIS_LABELS[x_axis] || x_axis;

    if (!data || data.length === 0) {
        document.getElementById("chart_wrap").style.display = "none";
        document.getElementById("chart_empty").style.display = "flex";
        document.getElementById("chart_summary").innerHTML = "";
        return;
    }
    document.getElementById("chart_wrap").style.display = "block";
    document.getElementById("chart_empty").style.display = "none";

    var labels = data.map(function(d) { return d.label; });
    var rates = data.map(function(d) { return d.rate; });
    var nums = data.map(function(d) { return d.numerator; });
    var dens = data.map(function(d) { return d.denominator; });

    // Compute top/bottom 5 indices for school axis
    var showLabels = [];
    if (x_axis === "school" && rates.length > 10) {
        var indexed = rates.map(function(r, i) { return { rate: r, index: i }; });
        var sorted = indexed.slice().sort(function(a, b) { return b.rate - a.rate; });
        var topSet = {};
        for (var ti = 0; ti < 5 && ti < sorted.length; ti++) topSet[sorted[ti].index] = true;
        var botSet = {};
        for (var bi = sorted.length - 1; bi >= sorted.length - 5 && bi >= 0; bi--) botSet[sorted[bi].index] = true;
        for (var si = 0; si < rates.length; si++) showLabels.push(topSet[si] || botSet[si]);
    } else {
        for (var ai = 0; ai < rates.length; ai++) showLabels.push(true);
    }

    if (chartInstance) chartInstance.destroy();

    var colors = [
        "rgba(124,58,237,0.65)", "rgba(59,130,246,0.65)", "rgba(16,185,129,0.65)",
        "rgba(245,158,11,0.65)", "rgba(239,68,68,0.65)", "rgba(139,92,246,0.65)",
        "rgba(6,182,212,0.65)", "rgba(34,197,94,0.65)", "rgba(249,115,22,0.65)",
        "rgba(168,85,247,0.65)", "rgba(14,165,233,0.65)", "rgba(236,72,153,0.65)"
    ];

    var ctx = document.getElementById("usageChart").getContext("2d");
    chartInstance = new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "使用率 (%)",
                data: rates,
                backgroundColor: rates.map(function(_, i) { return colors[i % colors.length]; }),
                borderColor: rates.map(function(_, i) { return colors[i % colors.length].replace("0.65", "1"); }),
                borderWidth: 1,
                borderRadius: 6,
                maxBarThickness: 60
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: { padding: { top: 25 } },
            plugins: {
                legend: { display: false },
                datalabels: {
                    anchor: "end",
                    align: "top",
                    offset: 2,
                    font: { size: 10, weight: "600" },
                    color: "rgba(0,0,0,0.55)",
                    formatter: function(value, context) {
                        return showLabels[context.dataIndex] ? value + "%" : "";
                    }
                },
                tooltip: {
                    backgroundColor: "rgba(15,23,42,0.9)",
                    titleFont: { size: 13, weight: "600" },
                    bodyFont: { size: 12 },
                    padding: 10,
                    cornerRadius: 8,
                    callbacks: {
                        label: function(ctx) {
                            var i = ctx.dataIndex;
                            return ["使用率: " + rates[i] + "%", "使用人数: " + nums[i], "总人数: " + dens[i]];
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    max: 100,
                    grid: { color: "rgba(0,0,0,0.04)" },
                    ticks: {
                        callback: function(v) { return v + "%"; },
                        font: { size: 11 }
                    }
                },
                x: {
                    grid: { display: false },
                    ticks: { font: { size: 11 }, maxRotation: 45 }
                }
            }
        }
    });

    // Summary
    var avgRate = rates.length ? (rates.reduce(function(a,b){return a+b},0) / rates.length).toFixed(1) : 0;
    var maxRate = rates.length ? Math.max.apply(null, rates) : 0;
    var minRate = rates.length ? Math.min.apply(null, rates) : 0;
    var maxIdx = rates.indexOf(maxRate);
    var minIdx = rates.indexOf(minRate);
    var maxLabel = rates.length ? labels[maxIdx] : "-";
    var minLabel = rates.length ? labels[minIdx] : "-";

    var summaryHtml =
        '<div class="stat">平均使用率: <span class="stat-val">' + avgRate + '%</span></div>' +
        '<div class="stat">最高: <span class="stat-val">' + maxRate + '%</span> (' + maxLabel + ')</div>' +
        '<div class="stat">最低: <span class="stat-val">' + minRate + '%</span> (' + minLabel + ')</div>' +
        '<div class="stat">共 <span class="stat-val">' + labels.length + '</span> 项</div>';

    if (x_axis === "school") {
        var top5 = data.slice().sort(function(a, b) { return b.rate - a.rate; }).slice(0, 5);
        var top5Html = top5.map(function(d, i) {
            return '<span class="rank">' + (i+1) + '.</span> ' + d.label;
        }).join('&nbsp;&nbsp;');
        summaryHtml += '<div class="stat top5">使用率前5: ' + top5Html + '</div>';
    }

    document.getElementById("chart_summary").innerHTML = summaryHtml;

    // 数据来源脚注
    var footer = document.getElementById("dataSourceFooter");
    var sourceText = document.getElementById("footerSourceText");
    if (footer && sourceText && resp.source) {
        var sourceMap = {"metabase-api": "Metabase API 实时数据", "sls": "SLS 实时数据", "metabase": "本地数据库"};
        sourceText.textContent = "数据来源: " + (sourceMap[resp.source] || "本地数据库");
        footer.style.display = "block";
    }
}

async function queryChart() {
    var btn = document.getElementById("c_btn");
    btn.disabled = true;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:12px;height:12px;animation:spin 1s linear infinite"><circle cx="12" cy="12" r="10" stroke-dasharray="60" stroke-dashoffset="20"/></svg> 查询中...';

    var params = new URLSearchParams();
    params.set("start_date", document.getElementById("c_start").value);
    params.set("end_date", document.getElementById("c_end").value);

    var school = document.getElementById("c_school").value;
    if (school) params.set("school_id", school);
    var stage = document.getElementById("c_stage").value;
    if (stage) params.set("stage", stage);
    var grade = document.getElementById("c_grade").value;
    if (grade) params.set("grade", grade);
    var subject = document.getElementById("c_subject").value;
    if (subject) params.set("subject", subject);

    try {
        var resp = await fetch("/api/charts/platform-usage?" + params.toString());
        var data = await resp.json();
        if (data.error) { alert(data.error); return; }
        renderChart(data);
    } catch(e) {
        alert("查询失败: " + e.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:12px;height:12px"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg> 查询';
    }
}

async function initPage() {
    initDefaults();
    try {
        var resp = await fetch("/api/charts/options");
        OPTIONS = await resp.json();
    } catch(e) {
        console.error("加载选项失败:", e);
        return;
    }

    fillSelect("c_school", OPTIONS.schools, function(s){return s.id}, function(s){return s.name});
    fillSelect("c_stage", OPTIONS.stages, function(s){return s}, function(s){return s});
    fillSelect("c_grade", OPTIONS.grades, function(s){return s}, function(s){return s});
    fillSelect("c_subject", OPTIONS.subjects, function(s){return s}, function(s){return s});

    document.getElementById("c_school").addEventListener("change", onSchoolChange);
    document.getElementById("c_stage").addEventListener("change", onStageChange);

    queryChart();
}

initPage();
</script>
<style>
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
{% endblock %}
